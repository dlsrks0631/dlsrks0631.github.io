<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Page</title>
  <style>
    body, html {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #333;
      background: #f8f9fa;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }

    h2 {
      color: #007bff;
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #666;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    .contact-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 10px;
      border-radius: 5px;
    }

    .contact-icon {
      color: #007bff;
      font-size: 24px;
      width: 30px;
      margin-right: 10px;
    }

    .contact-text a {
      color: #007bff;
      text-decoration: none;
      font-size: 18px;
    }

    .contact-text a:hover {
      text-decoration: underline;
    }

    #map {
      width: 100%;
      height: 350px;
      margin-top: 20px;
      background: #e9ecef;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <div class="mb-4">
        <h2>Contact Information</h2>
        <p>Please feel free to reach out to us with any questions or comments!</p>
      </div>

      <ul>
        <li>
          <i class="contact-icon fas fa-envelope"></i>
          <span><a href="mailto:example@example.com">example@example.com</a></span>
        </li>
        <li>
          <i class="contact-icon fas fa-phone"></i>
          <span><a href="tel:+1234567890">+1 234 567 890</a></span>
        </li>
        <li>
          <i class="contact-icon fas fa-map-marker-alt"></i>
          <span>12344 Main St, City, Country</span>
        </li>
        <li>
          <i class="contact-icon fas fa-clock"></i>
          <span>Mon - Fri, 9:00 AM to 5:00 PM</span>
        </li>
      </ul>

      <div id="map"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var map = L.map('map').setView([51.505, -0.09], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    var marker = L.marker([51.505, -0.09]).addTo(map);
    marker.bindPopup("<b>Hello world!</b><br />I am a popup.").openPopup();
  });
</script>
</body>
</html>
