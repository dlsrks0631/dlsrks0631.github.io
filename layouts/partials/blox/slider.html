<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel Example</title>
    
    <style>
      .carousel {
        position: relative;
        width: 100%;
        overflow: hidden;
      }

      .carousel-inner {
        display: flex;
        width: 100%;
        transition: transform 0.5s ease;
      }

      .carousel-item {
        flex: 0 0 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        width: 100%;
        background-size: cover;
        background-position: center;
      }

      .carousel-control-prev,
      .carousel-control-next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 30px;
        color: white;
        text-decoration: none;
        width: 30px;
        height: 30px;
        background: rgba(0, 0, 0, 0.5);
        border: none;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        display: flex;
      }

      .carousel-control-prev-icon,
      .carousel-control-next-icon {
        display: block;
        width: 20px;
        height: 20px;
        background-size: 20px 20px;
        color: black;
      }

      .carousel-indicators {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
      }

      .carousel-indicators li {
        list-style: none;
        margin: 0 2px;
        background: black;
        width: 8px;
        height: 8px;
        border-radius: 100%;
        cursor: pointer;
      }

      .carousel-indicators .active {
        background: gray;
      }
    </style>
  </head>
  <body>
    <div id="exampleCarousel" class="carousel slide" data-ride="carousel">
        <!-- Indicators -->
        <ol class="carousel-indicators">
            {{ range $index, $slide := .Params.slides }}
            <li data-target="#exampleCarousel" data-slide-to="{{$index}}" {{ if eq $index 0 }}class="active"{{ end }}></li>
            {{ end }}
        </ol>
    
        <!-- Carousel slides wrapper -->
        <div class="carousel-inner">
            {{ range $index, $slide := .Params.slides }}
            <div class="carousel-item {{ if eq $index 0 }}active{{ end }}" style="
                background-image: url('{{ printf "/assets/media/%s" $slide.background.image.filename }}');
                filter: brightness({{ $slide.background.filters.brightness }});
                background-size: cover;
                background-position: center;">
                <div class="container">
                    <div class="carousel-caption text-{{ $slide.align }}">
                        <h5>{{ $slide.title }}</h5>
                        <p>{{ $slide.content }}</p>
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
    
        <!-- Controls -->
        <a class="carousel-control-prev" href="#exampleCarousel" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#exampleCarousel" role="button" data-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
        </a>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#exampleCarousel').carousel({
                interval: 3000,
                wrap: true
            });
        });
    </script
    
  </body>
</html>
