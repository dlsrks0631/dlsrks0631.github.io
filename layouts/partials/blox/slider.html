<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Inline CSS for Swiper -->
    <style>
        .swiper-container {
            width: 100%;
            height: 350px;
        }

        .swiper-slide {
            background-size: cover;
            background-repeat: no-repeat;
        }

        .slide-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Slider Section -->
    <div class="swiper-container mySwiper">
        <div class="swiper-wrapper">
            {{ range .Params.sections }}
                {{ if eq .block "slider" }}
                    {{ range .content.slides }}
                        <div class="swiper-slide" style="background-image: url('{{ printf "media/%s" .background.image.filename }}'); background-position: {{ .background.position }}; background-color: {{ .background.color }}; filter: brightness({{ .background.image.filters.brightness }});">
                            <div class="slide-content" style="text-align: {{ .align }};">
                                <h2>{{ .title }}</h2>
                                <p>{{ .content }}</p>
                            </div>
                        </div>
                    {{ end }}
                {{ end }}
            {{ end }}
        </div>
        <!-- Add Pagination -->
        <div class="swiper-pagination"></div>
        <!-- Add Navigation -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>
</body>
</html>
