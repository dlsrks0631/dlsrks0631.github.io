<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Slider</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      .slider {
        width: 100px;
        height: 350px;
        position: relative;
        overflow: hidden;
        margin: auto;
      }
      .slides {
        display: flex;
        transition: transform 0.5s ease-in-out;
      }
      .slide {
        width: 100%;
        height: 350px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-size: cover;
        background-position: center;
        filter: brightness(0.5);
      }
      .content {
        text-align: center;
        color: white;
        background-color: rgba(
          51,
          51,
          51,
          0.5
        ); /* background color with opacity */
        padding: 20px;
        border-radius: 10px;
      }
      .prev,
      .next {
        cursor: pointer;
        position: absolute;
        top: 50%;
        width: auto;
        padding: 16px;
        margin-top: -22px;
        color: white;
        font-weight: bold;
        font-size: 18px;
        transition: 0.6s ease;
        border-radius: 0 3px 3px 0;
        user-select: none;
      }
      .prev {
        left: 0;
        border-radius: 3px 0 0 3px;
      }
      .next {
        right: 0;
        border-radius: 0 3px 3px 0;
      }
      .prev:hover,
      .next:hover {
        background-color: rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <div class="slider">
      <div class="slides">
        <div class="slide active" style="background-image: url('logo.jpg')">
          <div class="content">
            <h1>AI</h1>
            <p>Just opened last month!</p>
          </div>
        </div>
        <div class="slide" style="background-image: url('logo.jpg')">
          <div class="content">
            <h1>AI</h1>
            <p>Just opened last month!</p>
          </div>
        </div>
        <div class="slide" style="background-image: url('logo.jpg')">
          <div class="content">
            <h1>AI</h1>
            <p>Just opened last month!</p>
          </div>
        </div>
        <div class="slide" style="background-image: url('logo.jpg')">
          <div class="content">
            <h1>AI</h1>
            <p>Just opened last month!</p>
          </div>
        </div>
      </div>
      <a class="prev" onclick="moveSlide(-1)">&#10094;</a>
      <a class="next" onclick="moveSlide(1)">&#10095;</a>
    </div>
    <script>
      let slideIndex = 0;
      showSlides();

      function showSlides() {
        let i;
        let slides = document.getElementsByClassName("slide");
        for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";
        }
        slideIndex++;
        if (slideIndex > slides.length) {
          slideIndex = 1;
        }
        slides[slideIndex - 1].style.display = "block";
        setTimeout(showSlides, 3000); // Change image every 3 seconds
      }

      function moveSlide(n) {
        slideIndex += n - 1;
        showSlides();
      }
    </script>
  </body>
</html>
