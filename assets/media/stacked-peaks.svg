<svg width="800px" height="300px" xmlns="http://www.w3.org/2000/svg">
  <!-- 바탕색 -->
  <rect width="800" height="300" fill="#cce7ff" />

  <!-- 각 층별 색상 및 그라데이션 -->
  <rect y="0" width="800" height="60" fill="#b3dfff" />
  <rect y="60" width="800" height="60" fill="#99d6ff" />
  <rect y="120" width="800" height="60" fill="#80ccff" />
  <rect y="180" width="800" height="60" fill="#66c2ff" />
  <rect y="240" width="800" height="60" fill="#cce7ff" />

  <!-- 그라데이션 효과 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b3dfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66c2ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="300" fill="url(#grad1)" opacity="0.6" />
</svg>



